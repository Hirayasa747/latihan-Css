<html lang="en">
<head>

    <style>

           button {
      margin-right: 10px;
      }

        .uber {
            background-color: black;
            color: white;
            font-family: arial;
            font-size: 16px;
            padding: 8px 12px;
            border: 0px;


        }
        .uber:hover {
             opacity: 0.7;
        }


        .amazon {
            background-color: rgb(255, 216, 20);
            color: black;
            font-family: arial;
            font-size: 16px;
            padding: 10px 50px;
            border: 0px;
            border-radius: 20px;
        }
        .amazon:hover {
            background-color: rgb(187, 159, 15);
            cursor: pointer;
        }


        .Github {
            background-color: rgb(46, 164, 79);
            color: white;
            font-family: arial;
            font-size: 16px;
            padding: 10px 20px;
            border: 0px;
            border-radius: 10px;
            transition: box-shadow 0.3s ease;
        }

        .Github:hover {
           box-shadow: 0 12px 10px rgba(0,0,0,0.7);
            cursor: pointer;
        }


          .Bootstrap {
            background-color: rgb(121, 82, 179);
            color: white;
            font-family: arial;
            font-size: 16px;
            border: 0px;
            padding: 10px 20px;
        }


        .Bootstrap:hover {
            background-color: rgb(71, 47, 107);
            cursor: pointer;
        }



        .bootstrap {
            background-color: white;
            color: rgb(108, 117, 125);
            font-family: arial;
            font-size: 16px;
            padding: 10px 20px;
            border: 2px solid rgb(108, 117, 125);
            border-radius: 5px;
        }

        .bootstrap:hover {
            background-color: rgb(108, 117, 125);
            color: white;
            cursor: pointer;
        }


        .Linkedin {
            background-color: rgb(10, 102, 194);

            border-radius: 20px;
        }


        .Linkedin:hover {
            background-color: rgb(4, 56, 108);
            cursor: pointer;
        }




        .linkedin {
            background-color: white;
            color: rgb(10, 102, 194);
            font-family: arial;
            font-size: 16px;
            padding: 10px 20px;
           border-color: rgb(10, 102, 194);
            border-width: 1px;
            border-radius: 20px;
        }

        .linkedin:hover {
            background-color: rgb(220, 220, 245);
            border-width : 2px;
        }


    </style>
</head>

      <h3>lesson 3d</h3>
