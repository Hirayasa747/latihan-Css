<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 14d</title>
<style>

body{font-family: Arial, Helvetica, sans-serif;}

.sidebar{
  position: fixed;
    
  top: 0;
  right: 0;

  width: 100px;
  height: 100%;

  background-color: green;
  color: white;
}





.overlay{
  position: fixed;

  top: 0;
  bottom: 0;
  left: 0;
  right: 0;

  background-color: rgba(0,0,0,0.8);

  display: flex;

  justify-content: center;

  align-items: center;
}

.modal{
   background-color: white;
  width: 320px;
  padding: 20px;
  border-radius: 8px;
}

.modal h2 {
  margin-top: 0;
  margin-bottom: 10px;
}

.modal p {
  margin-top: 0;
  margin-bottom: 15px;
}

</style>
</head>
<body>
 <div class="sidebar">right sidebar</div>
 
 <div class="overlay">

    <div class="modal">

      <h2>Modal Title</h2>

      <p>This is a modal</p>

      <button>Close</button>

    </div>

  </div>


</body>
</html>
